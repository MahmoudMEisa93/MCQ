<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZerDr | The ER Doctor</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 16px;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .name {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      color: #cbd5f5;
      margin-bottom: 30px;
    }

    .contact a {
      display: block;
      margin: 10px 0;
      text-decoration: none;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      background: #2563eb;
      transition: 0.3s;
    }

    .contact a:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #94a3b8;
    }

  </style>
</head>

<body>

  <div class="container">
    
    <div class="logo">ZerDr</div>
    <div class="tagline">The ER Doctor</div>

    <div class="name">Dr. Mahmoud M. Eisa</div>
    <div class="title">Emergency Medicine Physician</div>

    <div class="contact">
      <a href="mailto:Dr.mmEisa@gmail.com">📧 Dr.mmEisa@gmail.com</a>
      <a href="https://wa.me/201013975030" target="_blank">📱 WhatsApp Contact</a>
    </div>

    <div class="footer">
      © 2026 ZerDr.com — All Rights Reserved
    </div>

  </div>

</body>
</html>
